<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>vibentry</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="brand"><span>v</span><strong>vibentry</strong></div>
      <button id="newChatBtn" class="new-chat" type="button">+ 새 작품 대화</button>
      <p class="rail-label">최근 대화</p>
      <div id="historyList" class="history-list"></div>
      <button id="settingsBtn" class="settings-link" type="button">Gemini API 설정</button>
    </aside>

    <main class="chat-shell">
      <header class="topbar">
        <button id="menuBtn" class="icon-btn mobile-only" type="button" aria-label="메뉴">☰</button>
        <div><strong id="chatTitle">새 Entry 작품</strong><small id="modelStatus">Gemini 자동 선택</small></div>
        <button id="previewBtn" class="preview-toggle" type="button">작품 보기</button>
      </header>

      <section id="chatThread" class="chat-thread" aria-live="polite">
        <article class="message assistant">
          <div class="avatar">v</div>
          <div class="bubble">
            <strong>무엇을 만들어 볼까요?</strong>
            <p>초보자도 편하게 말로 설명하면 돼요. 오브젝트 추가·삭제, 블록 수정, 이미지 만들기, 링크 참고까지 같은 대화에서 계속 이어서 작업할 수 있어요.</p>
            <div class="suggestions">
              <button data-sample="클릭할 때마다 숫자가 올라가고 기록을 리스트에 저장하는 작품을 만들어줘">숫자 카운터</button>
              <button data-sample="귀여운 우주 고양이 이미지를 만들고 화살표 키로 움직이는 게임을 만들어줘">이미지 게임</button>
            </div>
          </div>
        </article>
      </section>

      <div id="alertBox" class="alert hidden" role="alert"></div>
      <section class="composer-wrap">
        <div id="attachmentList" class="attachment-list"></div>
        <div class="composer">
          <label class="attach-btn" title="파일 첨부">
            <input id="fileInput" type="file" multiple accept=".ent,.json,.txt,.md,.csv,image/*">
            <span>＋</span>
          </label>
          <textarea id="userPrompt" rows="1" placeholder="vibentry에게 작품을 설명하세요"></textarea>
          <button id="generateBtn" class="send-btn" type="button" aria-label="보내기">↑</button>
        </div>
        <small class="composer-note">Enter로 보내기 · Shift+Enter로 줄바꿈</small>
      </section>
    </main>

    <aside id="inspector" class="inspector">
      <header><strong>현재 작품</strong><button id="closePreviewBtn" class="icon-btn" type="button">×</button></header>
      <div id="projectSummary" class="project-summary">아직 작품이 없어요.</div>
      <div id="stagePreview" class="stage-preview"><span>미리보기</span></div>
      <div id="objectList" class="object-list"></div>
      <div class="download-row">
        <button id="downloadEntBtn" disabled type="button">.ent 파일 받기</button>
        <button id="downloadJsonBtn" disabled type="button">JSON</button>
      </div>
    </aside>
  </div>

  <dialog id="settingsDialog">
    <form method="dialog" class="settings-card">
      <div class="dialog-head"><strong>Gemini 연결</strong><button value="cancel" class="icon-btn">×</button></div>
      <p>Google AI Studio에서 만든 API 키를 입력하면 사용할 수 있는 Gemini 모델을 자동으로 선택해요.</p>
      <label>API 키<input id="apiKey" type="password" placeholder="AIza..." autocomplete="off"></label>
      <label class="remember"><input id="rememberKey" type="checkbox"> 이 기기에 키 기억하기</label>
      <button id="saveSettingsBtn" value="default" class="primary">저장</button>
    </form>
  </dialog>

  <script type="module" src="./app.js"></script>
</body>
</html>
